name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run lint
      - run: bun test --coverage --coverage-reporter=lcov --reporter=junit --reporter-outfile=./test-results/junit.xml
        continue-on-error: true
      - name: Coverage summary
        if: always()
        run: bun run scripts/coverage-summary.js >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-results
          path: test-results/
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-report
          path: coverage/
